name: Train and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ----------------------------------------------------------------
  # Job 1: Train model and log to MLflow
  # ----------------------------------------------------------------
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train and log to MLflow
        env:
          MLFLOW_TRACKING_URI:      ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: python src/train.py

  # ----------------------------------------------------------------
  # Job 2: Evaluate — champion vs challenger on holdout set
  # ----------------------------------------------------------------
  evaluate:
    needs: train
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Champion vs challenger
        env:
          MLFLOW_TRACKING_URI:      ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: python src/evaluate.py
        # exits 0 -> challenger wins, registered to Staging, Job 3 runs
        # exits 1 -> challenger loses, CI stops here, nothing deployed

  # ----------------------------------------------------------------
  # Job 3: Package — build and push Docker image  [coming next]
